<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bible Bites — Estojos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --mother-earth: #513229;
      --background: #f0f9ff;
      --something-blue: #d8ebf9;
      --the-bay: #fce6b7;
      --sky-blue: #75b4ea;
      --ocean-blue: #2f6fa8;
      --honey: #f4bd35;
      --butter-yellow: #ffe59b;
      --white: #fffaf0;
      --shadow: 0 18px 50px rgba(81, 50, 41, 0.14);
      --radius: 28px;
      --gap: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--background);
      color: var(--mother-earth);
    }

    body.drawer-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .site-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 48px;
    }

    .top-header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 0 22px;
      background: rgba(240, 249, 255, 0.76);
      backdrop-filter: blur(12px);
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: min(260px, 58vw);
      height: auto;
      display: block;
    }

    .floating-actions {
      position: absolute;
      right: 0;
      top: 26px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pill {
      border: 1px solid rgba(81, 50, 41, 0.12);
      background: rgba(255, 250, 240, 0.78);
      color: var(--mother-earth);
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(81, 50, 41, 0.06);
    }

    .pill:hover {
      transform: translateY(-2px);
      background: var(--the-bay);
    }

    .gallery-heading {
      margin: 8px 0 24px;
      text-align: center;
    }

    .gallery-heading h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2.6vw, 1.6rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mother-earth);
    }

    .gallery-heading p {
      margin: 10px auto 0;
      max-width: 620px;
      font-size: 0.95rem;
      line-height: 1.6;
      opacity: 0.82;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
    }

    .product-card {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 0;
      padding: 0;
      background: #d2d2c9;
      cursor: pointer;
      overflow: hidden;
      display: block;
    }

    .product-image-window {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .product-image-track {
      width: 300%;
      height: 100%;
      display: flex;
      transform: translateX(0);
      will-change: transform;
    }

    .product-card.image-count-3 .product-image-track {
      width: 400%;
    }

    .product-card:hover .product-image-track {
      animation: productImageScroll2 5.8s ease-in-out infinite;
    }

    .product-card.image-count-3:hover .product-image-track {
      animation: productImageScroll3 8.7s ease-in-out infinite;
    }

    .product-image-track img {
      width: calc(100% / 3);
      flex: 0 0 calc(100% / 3);
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-card.image-count-3 .product-image-track img {
      width: calc(100% / 4);
      flex-basis: calc(100% / 4);
    }

    .product-card:hover .product-image-track img {
      filter: saturate(1.03) contrast(1.01);
    }

    @keyframes productImageScroll2 {
      0%, 34% {
        transform: translateX(0);
      }
      50%, 84% {
        transform: translateX(-33.333333%);
      }
      100% {
        transform: translateX(-66.666667%);
      }
    }

    @keyframes productImageScroll3 {
      0%, 22.666667% {
        transform: translateX(0);
      }
      33.333333%, 56% {
        transform: translateX(-25%);
      }
      66.666667%, 89.333333% {
        transform: translateX(-50%);
      }
      100% {
        transform: translateX(-75%);
      }
    }

    .product-card.no-image {
      background: transparent;
      cursor: default;
    }

    .ref-chip {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 2;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 250, 240, 0.88);
      color: var(--mother-earth);
      font-size: 0.74rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(81, 50, 41, 0.12);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      background: rgba(255, 250, 240, 0.6);
      border-radius: var(--radius);
      grid-column: 1 / -1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(81, 50, 41, 0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 30;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(480px, 100%);
      height: 100vh;
      background: var(--background);
      box-shadow: -20px 0 60px rgba(81, 50, 41, 0.22);
      transform: translateX(105%);
      transition: transform 220ms ease;
      z-index: 40;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-inner {
      padding: 18px;
    }

    .drawer-close {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.92);
      color: var(--mother-earth);
      cursor: pointer;
      font-size: 1.4rem;
      box-shadow: 0 8px 20px rgba(81, 50, 41, 0.12);
    }

    .drawer-media {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      background: #d2d2c9;
    }

    .drawer-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .drawer-media.no-image {
      display: none;
    }

    .drawer-next-image {
      position: absolute;
      right: 14px;
      bottom: 14px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 250, 240, 0.9);
      color: var(--mother-earth);
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(81, 50, 41, 0.14);
    }

    .drawer-content {
      padding: 22px 4px 8px;
    }

    .drawer-ref {
      display: inline-flex;
      margin-bottom: 10px;
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--the-bay);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .drawer-title {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      line-height: 1.1;
    }

    .drawer-price {
      margin: 10px 0 0;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--ocean-blue);
    }

    .drawer-description,
    .drawer-note,
    .drawer-size {
      margin: 16px 0 0;
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .drawer-note {
      padding: 12px 14px;
      background: rgba(252, 230, 183, 0.58);
      border-radius: 16px;
    }

    .drawer-actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .want-btn {
      border: 0;
      border-radius: 999px;
      padding: 15px 18px;
      background: var(--mother-earth);
      color: var(--background);
      font-weight: 800;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 12px 28px rgba(81, 50, 41, 0.18);
    }

    .instagram-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      padding: 14px 18px;
      background: var(--the-bay);
      color: var(--mother-earth);
      font-weight: 800;
    }

    .copy-note {
      min-height: 22px;
      font-size: 0.82rem;
      line-height: 1.5;
      opacity: 0.8;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }

      .floating-actions {
        position: static;
        margin-left: 12px;
      }

      .top-header {
        justify-content: space-between;
      }
    }

    @media (max-width: 640px) {
      .site-shell {
        width: min(100% - 18px, 1180px);
        padding-top: 10px;
      }

      .top-header {
        padding: 12px 0 16px;
      }

      .logo-img {
        width: min(210px, 52vw);
      }

      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .pill {
        padding: 9px 12px;
        font-size: 0.82rem;
      }

      .drawer-inner {
        padding: 12px;
      }

      .drawer-media {
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="site-shell">
    <header class="top-header">
      <a class="logo-link" href="#" aria-label="Bible Bites">
        <img class="logo-img" src="imagens/logo.png" alt="Bible Bites">
      </a>

      <nav class="floating-actions" aria-label="Redes sociais">
        <a
          class="pill"
          href="https://www.instagram.com/biblebites.store/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>
      </nav>
    </header>

    <section class="gallery-heading">
      <h1>Estojos</h1>
      <p>Escolhe o teu estojo preferido. Ao carregar em “Eu quero!”, abrimos o chat do Instagram da Bible Bites Store.</p>
    </section>

    <main id="gallery" class="gallery" aria-live="polite"></main>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-inner">
      <button id="closeDrawerBtn" class="drawer-close" type="button" aria-label="Fechar">×</button>

      <div id="drawerMedia" class="drawer-media">
        <img id="drawerImg" src="" alt="">
        <button id="drawerNextImageBtn" class="drawer-next-image" type="button">Ver mais</button>
      </div>

      <div class="drawer-content">
        <span id="drawerRef" class="drawer-ref"></span>
        <h2 id="drawerTitle" class="drawer-title"></h2>
        <p id="drawerPrice" class="drawer-price"></p>
        <p id="drawerDescription" class="drawer-description"></p>
        <p><strong>Tamanho:</strong> <span id="drawerSize" class="drawer-size"></span></p>
        <p id="drawerNote" class="drawer-note"></p>

        <div class="drawer-actions">
          <button id="wantBtn" class="want-btn" type="button">Eu quero!</button>

          <a
            class="instagram-btn"
            href="https://www.instagram.com/biblebites.store/"
            target="_blank"
            rel="noopener noreferrer"
          >
            Ver Instagram
          </a>

          <div id="copyNote" class="copy-note" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </aside>

  <script>
    const INSTAGRAM_PROFILE_URL = "https://www.instagram.com/biblebites.store/";
    const INSTAGRAM_CHAT_URL = "https://ig.me/m/biblebites.store";

    /*
      Coloca aqui apenas os produtos da categoria "estojos".

      Campos usados:
      - ref: referência do artigo
      - titulo: nome do artigo
      - preco: preço
      - categoria: deve ser "estojos"
      - tamanho: tamanho/medida
      - descricao: descrição curta
      - nota: nota opcional
      - imagem, imagem2, imagem3: caminhos das imagens
    */

    const produtos = [
      {
        ref: "BB-ESTOJO-001",
        titulo: "Estojo Bible Bites",
        preco: "8 €",
        categoria: "estojos",
        tamanho: "único",
        descricao: "Estojo prático para guardar canetas, marcadores, acessórios ou pequenos materiais do dia a dia.",
        nota: "Produto sujeito à disponibilidade de stock.",
        imagem: "imagens/estojo-001.jpg",
        imagem2: "imagens/estojo-001-2.jpg",
        imagem3: "imagens/estojo-001-3.jpg"
      },
      {
        ref: "BB-ESTOJO-002",
        titulo: "Estojo Fé",
        preco: "8 €",
        categoria: "estojos",
        tamanho: "único",
        descricao: "Estojo leve e funcional, pensado para acompanhar a rotina, a escola, a faculdade ou o trabalho.",
        nota: "As cores podem variar ligeiramente conforme a luz da fotografia.",
        imagem: "imagens/estojo-002.jpg",
        imagem2: "imagens/estojo-002-2.jpg",
        imagem3: "imagens/estojo-002-3.jpg"
      }
    ];

    const gallery = document.querySelector("#gallery");
    const drawer = document.querySelector("#drawer");
    const overlay = document.querySelector("#overlay");
    const closeDrawerBtn = document.querySelector("#closeDrawerBtn");
    const drawerMedia = document.querySelector("#drawerMedia");
    const drawerImg = document.querySelector("#drawerImg");
    const drawerNextImageBtn = document.querySelector("#drawerNextImageBtn");
    const drawerRef = document.querySelector("#drawerRef");
    const drawerTitle = document.querySelector("#drawerTitle");
    const drawerPrice = document.querySelector("#drawerPrice");
    const drawerDescription = document.querySelector("#drawerDescription");
    const drawerNote = document.querySelector("#drawerNote");
    const drawerSize = document.querySelector("#drawerSize");
    const wantBtn = document.querySelector("#wantBtn");
    const copyNote = document.querySelector("#copyNote");

    let produtoAtivo = null;
    let drawerImageIndex = 0;

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function produtoEhEstojo(produto) {
      const categoria = normalizarTexto(produto.categoria);
      const titulo = normalizarTexto(produto.titulo);

      return categoria.includes("estojo") || titulo.includes("estojo");
    }

    function getProductImages(produto) {
      return [produto.imagem, produto.imagem2, produto.imagem3]
        .filter(Boolean);
    }

    function renderGallery() {
      gallery.innerHTML = "";

      const produtosVisiveis = produtos.filter(produtoEhEstojo);

      if (!produtosVisiveis.length) {
        gallery.innerHTML = `
          <div class="empty-state">
            <strong>Não há estojos disponíveis neste momento.</strong>
          </div>
        `;
        return;
      }

      produtosVisiveis.forEach((produto) => {
        const card = document.createElement("button");
        card.className = "product-card";
        card.type = "button";
        card.setAttribute("aria-label", `Ver ${produto.titulo}`);

        const imagens = getProductImages(produto);

        const imagensPreview = imagens.length >= 3
          ? [imagens[0], imagens[1], imagens[2], imagens[0]]
          : imagens.length === 2
            ? [imagens[0], imagens[1], imagens[0]]
            : imagens.length === 1
              ? [imagens[0], imagens[0], imagens[0]]
              : [];

        card.classList.toggle("image-count-3", imagens.length >= 3);

        if (!imagensPreview.length) {
          card.classList.add("no-image");
          card.innerHTML = `<span class="ref-chip">${produto.ref}</span>`;
        } else {
          card.innerHTML = `
            <div class="product-image-window" aria-hidden="true">
              <div class="product-image-track">
                ${imagensPreview.map((imagem) => `<img src="${imagem}" alt="" loading="lazy" />`).join("")}
              </div>
            </div>
            <span class="ref-chip">${produto.ref}</span>
          `;

          const firstImg = card.querySelector("img");

          firstImg.addEventListener("error", () => {
            card.classList.add("no-image");
            card.innerHTML = `<span class="ref-chip">${produto.ref}</span>`;
          }, { once: true });
        }

        card.addEventListener("click", () => openDrawer(produto));
        gallery.appendChild(card);
      });
    }

    function openDrawer(produto) {
      produtoAtivo = produto;
      drawerImageIndex = 0;

      updateDrawerImage();

      drawerRef.textContent = produto.ref;
      drawerTitle.textContent = produto.titulo;
      drawerPrice.textContent = produto.preco;
      drawerDescription.textContent = produto.descricao;
      drawerNote.textContent = produto.nota || "";
      drawerNote.hidden = !produto.nota;
      drawerSize.textContent = produto.tamanho || "Não indicado";
      copyNote.textContent = "";

      drawer.classList.add("open");
      overlay.classList.add("open");
      document.body.classList.add("drawer-open");
      drawer.setAttribute("aria-hidden", "false");
      overlay.setAttribute("aria-hidden", "false");
    }

    function updateDrawerImage() {
      if (!produtoAtivo) return;

      const imagens = getProductImages(produtoAtivo);
      const imagemAtual = imagens[drawerImageIndex] || imagens[0];
      const temImagem = Boolean(imagens[0]);

      drawerImg.onerror = null;
      drawerMedia.classList.toggle("no-image", !temImagem);
      drawerNextImageBtn.hidden = !temImagem || imagens.length <= 1;

      drawerImg.src = temImagem ? imagemAtual : "";
      drawerImg.alt = temImagem ? `${produtoAtivo.titulo} — imagem ${drawerImageIndex + 1}` : "";

      drawerImg.onerror = () => {
        drawerMedia.classList.add("no-image");
        drawerNextImageBtn.hidden = true;
        drawerImg.src = "";
        drawerImg.alt = "";
      };
    }

    function showNextDrawerImage(event) {
      event.stopPropagation();

      if (!produtoAtivo) return;

      const imagens = getProductImages(produtoAtivo);

      if (!imagens.length) return;

      drawerImageIndex = (drawerImageIndex + 1) % imagens.length;
      updateDrawerImage();
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
      document.body.classList.remove("drawer-open");
      drawer.setAttribute("aria-hidden", "true");
      overlay.setAttribute("aria-hidden", "true");
    }

    async function copyMessage(message) {
      try {
        await navigator.clipboard.writeText(message);
        copyNote.textContent = "Mensagem copiada. Se o Instagram não a preencher, cola no chat.";
      } catch (error) {
        copyNote.textContent = "Se o Instagram não preencher a mensagem, copia a referência: " + produtoAtivo.ref;
      }
    }

    function abrirInstagram() {
      if (!produtoAtivo) return;

      const mensagem = `Olá! Quero comprar/reservar o artigo "${produtoAtivo.ref}" — ${produtoAtivo.titulo}.`;
      copyMessage(mensagem);

      window.open(INSTAGRAM_CHAT_URL, "_blank", "noopener,noreferrer");
    }

    drawerNextImageBtn.addEventListener("click", showNextDrawerImage);
    wantBtn.addEventListener("click", abrirInstagram);
    closeDrawerBtn.addEventListener("click", closeDrawer);
    overlay.addEventListener("click", closeDrawer);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDrawer();
    });

    renderGallery();
  </script>
</body>
</html>
